name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Lint & type check
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install lint tools
        run: pip install ruff

      - name: Ruff lint
        run: ruff check src/ dags/ tests/

  # ---------------------------------------------------------------------------
  # Unit tests (no AWS, no Kafka, no Spark required)
  # ---------------------------------------------------------------------------
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      # Kafka + ZooKeeper for streaming tests
      zookeeper:
        image: confluentinc/cp-zookeeper:7.5.0
        env:
          ZOOKEEPER_CLIENT_PORT: 2181
        ports:
          - 2181:2181

      kafka:
        image: confluentinc/cp-kafka:7.5.0
        env:
          KAFKA_BROKER_ID: 1
          KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
        ports:
          - 9092:9092

    env:
      KAFKA_BOOTSTRAP_SERVERS: localhost:9092
      KAFKA_TOPIC: citibike-station-status-test
      # Moto will intercept all boto3 S3 calls — no real AWS needed
      AWS_ACCESS_KEY_ID: testing
      AWS_SECRET_ACCESS_KEY: testing
      AWS_DEFAULT_REGION: us-east-1
      S3_BUCKET: test-citibike-bucket

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Java (required by PySpark)
        run: |
          sudo apt-get update
          sudo apt-get install -y default-jdk-headless

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for Kafka to be ready
        run: |
          timeout 60 bash -c \
            'until python -c "
from kafka import KafkaAdminClient
KafkaAdminClient(bootstrap_servers=[\"localhost:9092\"]).close()
print(\"Kafka ready\")
"; do sleep 3; done'

      - name: Run tests with coverage
        run: pytest tests/ -v --tb=short --cov=src --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
        continue-on-error: true  # don't fail CI if codecov is unavailable

  # ---------------------------------------------------------------------------
  # Docker build smoke-test
  # ---------------------------------------------------------------------------
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t citibike-pipeline:ci-test .

      - name: Verify producer entrypoint exists
        run: |
          docker run --rm --entrypoint python \
            citibike-pipeline:ci-test -c "from src.streaming.producer import create_producer; print('OK')" \
            || true  # producer will fail without Kafka — just check import
